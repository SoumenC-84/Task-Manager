name: Backend CI
on:
  push:
    branches: master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore MicroservicesPOC.sln

      - name: Build the project
        run: dotnet build MicroservicesPOC.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test MicroservicesPOC.sln --configuration Release --no-build
        
 