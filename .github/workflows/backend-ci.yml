name: Backend and Frontend CI

on:
  push:
    branches:
      - master

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source Code
        uses: actions/checkout@v4

      # ==========================
      # Next.js Frontend
      # ==========================

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Frontend Dependencies
        working-directory: UI/frontend
        run: npm install

      - name: Build Frontend
        working-directory: UI/frontend
        run: npm run build

      # ==========================
      # .NET Backend
      # ==========================

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore Dependencies
        run: dotnet restore MicroservicesPOC.sln

      - name: Build Solution
        run: dotnet build MicroservicesPOC.sln --configuration Release --no-restore

      - name: Run Tests
        run: dotnet test MicroservicesPOC.sln --configuration Release --no-build