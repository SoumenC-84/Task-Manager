name: Deploy UserService to Azure

on:
  push:
    branches:
      - master
    paths:
      - 'UserService/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore ./UserService/UserService.csproj

    - name: Build
      run: dotnet build ./UserService/UserService.csproj --configuration Release --no-restore

    - name: Publish
      run: dotnet publish ./UserService/UserService.csproj -c Release -o publish

    - name: Deploy to Azure
      uses: azure/webapps-deploy@v3
      with:
        app-name: userservice-api-demo
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./publish